name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        # Project Pages are served from /<repo>/, so the app must be built with
        # that base path (links, assets and raw <img> tags all depend on it).
        env:
          NEXT_PUBLIC_BASE_PATH: /pro-pressure-washing
        run: npm run build

      - name: Disable Jekyll
        # GitHub Pages runs Jekyll by default, which ignores files/folders that
        # start with "_" — including Next's _next/ assets. This turns it off.
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
